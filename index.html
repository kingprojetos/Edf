<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quiz: Introdução à Educação Física</title>
    <style>
        /* Estilo focado em legibilidade no celular */
        * { box-sizing: border-box; font-family: 'Segoe UI', Helvetica, Arial, sans-serif; }
        body { background-color: #eef2f7; display: flex; justify-content: center; padding: 15px; margin: 0; min-height: 100vh; }
        
        .container { 
            background: white; 
            padding: 20px; 
            border-radius: 20px; 
            box-shadow: 0 8px 24px rgba(0,0,0,0.12); 
            width: 100%; 
            max-width: 450px; 
            text-align: center; 
            align-self: center;
        }

        .screen { display: none; }
        .screen.active { display: block; animation: fadeIn 0.4s; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        h1 { color: #0056b3; font-size: 1.6rem; margin-bottom: 10px; }
        p { color: #555; line-height: 1.4; }

        input { 
            width: 100%; 
            padding: 14px; 
            margin: 20px 0; 
            border: 2px solid #ddd; 
            border-radius: 12px; 
            font-size: 16px; 
            outline: none;
            transition: border-color 0.3s;
        }
        input:focus { border-color: #0056b3; }

        button { 
            background-color: #0056b3; 
            color: white; 
            border: none; 
            padding: 16px; 
            width: 100%; 
            border-radius: 12px; 
            font-size: 16px; 
            font-weight: bold; 
            cursor: pointer; 
            margin-bottom: 10px;
            transition: background 0.2s;
        }
        button:active { background-color: #003d7a; transform: scale(0.98); }

        /* Estilo das opções da prova (A-E) */
        .option-btn { 
            background-color: #ffffff; 
            color: #333; 
            border: 2px solid #e0e0e0; 
            text-align: left; 
            font-weight: 500; 
            margin-bottom: 12px;
            padding: 12px 15px;
            line-height: 1.3;
        }
        .option-btn:disabled { color: white; border: none; }

        .header { 
            display: flex; 
            justify-content: space-between; 
            margin-bottom: 20px; 
            font-size: 13px; 
            font-weight: bold;
            color: #666; 
            background: #f8f9fa;
            padding: 10px;
            border-radius: 8px;
        }

        #question-text { 
            font-size: 1.1rem; 
            margin-bottom: 20px; 
            color: #222; 
            text-align: left;
            line-height: 1.5;
        }

        #leaderboard-list { list-style: none; padding: 0; text-align: left; }
        #leaderboard-list li { 
            padding: 12px; 
            border-bottom: 1px solid #eee; 
            display: flex; 
            justify-content: space-between;
            font-size: 15px;
        }
        #leaderboard-list li:first-child { color: #d4af37; font-weight: bold; font-size: 1.1rem; }

        .footer-btns { margin-top: 25px; border-top: 1px solid #eee; padding-top: 15px; }
    </style>
</head>
<body>

    <div class="container">
        <div id="login-screen" class="screen active">
            <h1>🎓 Simulado Intro. Ed. Física</h1>
            <p>Prepare-se para a prova! Responda 100 questões baseadas no PDF sem repetições.</p>
            <input type="text" id="username" placeholder="Digite seu nome completo..." autocomplete="off">
            <button onclick="startGame()">INICIAR DESAFIO</button>
        </div>

        <div id="game-screen" class="screen">
            <div class="header">
                <span id="player-name">Carregando...</span>
                <span id="score-display">Pontos: 0</span>
            </div>
            <div id="quiz-area">
                <h2 id="question-text">Preparando questões...</h2>
                <div id="options-container"></div>
            </div>
            <div class="footer-btns">
                <button onclick="finishGame()" style="background-color: #6c757d;">ENCERRAR E VER RANKING</button>
            </div>
        </div>

        <div id="leaderboard-screen" class="screen">
            <h2>🏆 Top 10 Melhores Notas</h2>
            <ul id="leaderboard-list"></ul>
            <button onclick="restartGame()" style="background-color: #28a745; margin-top: 20px;">TENTAR NOVAMENTE</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>

    <script src="app.js"></script>

</body>
</html>

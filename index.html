<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Simulado Acadêmico</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #f0f4f8; display: flex; justify-content: center; padding: 15px; margin: 0; min-height: 100vh; }
        .container { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 480px; align-self: center; }
        .screen { display: none; }
        .screen.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        h1 { color: #1a73e8; text-align: center; font-size: 1.5rem; }
        input { width: 100%; padding: 15px; margin: 15px 0; border: 2px solid #ddd; border-radius: 12px; font-size: 16px; }
        button { background-color: #1a73e8; color: white; border: none; padding: 16px; width: 100%; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; margin-bottom: 12px; }
        .btn-bio { background-color: #28a745; } /* Verde para Bio */
        .btn-ef { background-color: #f39c12; } /* Laranja para EF */
        .option-btn { background-color: #fff; color: #333; border: 2px solid #eee; text-align: left; font-weight: 500; }
        .header { display: flex; justify-content: space-between; padding: 10px; background: #f8f9fa; border-radius: 8px; margin-bottom: 15px; font-size: 14px; font-weight: bold; }
        #leaderboard-list { list-style: none; padding: 0; }
        #leaderboard-list li { padding: 10px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

    <div class="container">
        <div id="login-screen" class="screen active">
            <h1>📝 Bem-vindo ao Simulado</h1>
            <input type="text" id="username" placeholder="Seu nome completo...">
            <button onclick="goToMenu()">AVANÇAR</button>
        </div>

        <div id="menu-screen" class="screen">
            <h1>Escolha a Disciplina</h1>
            <p style="text-align:center">Selecione o tema do seu simulado:</p>
            <button class="btn-ef" onclick="startQuiz('educacao_fisica')">Introdução à Ed. Física</button>
            <button class="btn-bio" onclick="startQuiz('biologia_celular')">Introdução à Bio. Celular</button>
        </div>

        <div id="game-screen" class="screen">
            <div class="header">
                <span id="display-materia">Matéria</span>
                <span id="score-display">Pts: 0</span>
            </div>
            <h2 id="question-text">Carregando...</h2>
            <div id="options-container"></div>
            <button onclick="finishGame()" style="background-color: #666; margin-top:20px">SAIR E VER RANKING</button>
        </div>

        <div id="leaderboard-screen" class="screen">
            <h2 id="rank-title">🏆 Ranking</h2>
            <ul id="leaderboard-list"></ul>
            <button onclick="location.reload()">VOLTAR AO INÍCIO</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <script src="app.js"></script>
</body>
</html>
